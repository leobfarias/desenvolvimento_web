<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Confirmação – Evento de Recuperação de Crédito</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
 
  <h2>Inscrição confirmada!</h2>
 
  <table>
    <tr><th>Campo</th>          <th>Valor</th></tr>
    <tr><td>Nome</td>           <td>{{nome}}</td></tr>
    <tr><td>E-mail</td>         <td>{{email}}</td></tr>
    <tr><td>Valor da dívida</td><td>{{valor}}</td></tr>
    <tr><td>Data de início</td> <td>{{data}}</td></tr>
    <tr><td>Tempo da dívida</td><td>{{tempo}}</td></tr>
    <tr><td>Situação</td>       <td>{{situacao}}</td></tr>
  </table>
 
  <a href="/">← Voltar ao formulário</a>
 
</body>
</html>
