<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Inscrição – Evento de Recuperação de Crédito</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
 
  <h2>Inscrição no Evento</h2>
 
  <form action="/confirmacao" method="post">
 
    <!-- nome completo -->
    <label for="nome">Nome completo</label>
    <input type="text" id="nome" name="nome" placeholder="Seu nome completo">
 
    <!-- e-mail -->
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="exemplo@email.com">
 
    <!-- valor da dívida -->
    <label for="valor">Valor da dívida (R$)</label>
    <input type="number" id="valor" name="valor" placeholder="0.00" step="0.01" min="0">
 
    <!-- data de início da dívida -->
    <label for="data">Data de início da dívida</label>
    <input type="date" id="data" name="data">
 
    <button type="submit">Enviar inscrição</button>
 
  </form>
 
</body>
</html>
