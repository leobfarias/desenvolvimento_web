<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulários</title>
    </head>
    <body>
        <h1>Formulários: nome</h1>
        
        <form method="POST" action="/app-school/nome">
            <label for="nome">nome:</label>
            <input type="text" id="nome" name="nome" required><br/><br/>
            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar">
        </form>

        <h1>Formulários: senha</h1>
        <form method="POST" action="/app-school/senha">
            <label for="senha">senha:</label>
            <input type="password" id="senha" name="senha" required><br/><br/>
            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar">
        </form>

        <h1>Formulários: radio button</h1>
        <form method="POST" action="/app-school/genero">
        <input type="radio" id="genero_feminino" name="genero" value="Feminino">
        <label for="genero_feminino">Feminino</label>
        <input type="radio" id="genero_masculino" name="genero" value="Masculino">
        <label for="genero_masculino">Masculino</label>
        <input type="radio" id="genero_outro" name="genero" value="Outro">
        <label for="genero_outro">Outro</label><br/><br/>
        <input type="submit" value="Enviar">
        <input type="reset" value="Resetar">
        </form>

        <h1>Formulários: checkbox</h1>
        <form method="POST" action="/app-school/transporte">
            <input type="checkbox" id="transporte_onibus" name="transporte" value="Ônibus">
            <label for="transporte_onibus">Ônibus</label><br>
            <input type="checkbox" id="transporte_metro" name="transporte" value="Metrô">
            <label for="transporte_metro">Metrô</label><br>
            <input type="checkbox" id="transporte_navio" name="transporte" value="Navio">
            <label for="transporte_navio">Navio</label><br/><br/>
            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar">
        </form>

        <h1>Formulários: list</h1>
        <form method="POST" action="/app-school/cor">
            <label for="cor">Cor favorita:</label>
            <select id="cor" name="cor">
                <option value="Vermelho">Vermelho</option>
                <option value="Azul">Azul</option>
                <option value="Verde">Verde</option>
                <option value="Amarelo">Amarelo</option>
            </select><br/><br/>
            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar">
        </form>

        <h1>Formulários: textarea</h1>
        <form method="POST" action="/app-school/mensagem">
            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" rows="4" cols="50"></textarea><br/><br/>
            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar">
        </form>
    </body>
</html>
