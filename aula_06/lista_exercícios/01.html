<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EXERCÍCIO 1</title>
    </head>
    <body>
        <h1>Cadastro</h1>

        <form method="POST" action="/cadastro">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            <br/><br/>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            <br/><br/>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required>
            <br/><br/>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone" required>
            <br/><br/>

            <label for="funcao">Função:</label>
            <select id="funcao" name="funcao" required>
                <option value="">Selecione uma função</option>
                <option value="Gerente">Gerente</option>
                <option value="Desenvolvedor">Desenvolvedor</option>
                <option value="Designer">Designer</option>
                <option value="Analista">Analista</option>
            </select>
            <br/><br/>

            <label for="area">Área de Atuação:</label><br/><br/>
            <input type="radio" id="lideranca" name="area" value="liderança">
            <label for="lideranca">Liderança</label>
            <input type="radio" id="colaborador" name="area" value="colaborador">
            <label for="colaborador">Colaborador</label>
            <input type="radio" id="voluntario" name="area" value="voluntario">
            <label for="voluntario">Voluntário</label>
            <br/><br/>

            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar"> 
        </form>
    </body>
</html>
