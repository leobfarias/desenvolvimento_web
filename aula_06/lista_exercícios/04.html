<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EXERCÍCIO 4</title>
    </head>
    <body>

        <h1>Planejamento de Atividades</h1>

        <form method="POST" action="/atividades">

            <label for="projeto">Projeto:</label>
            <select id="projeto" name="projeto" required>
                <option value="">Selecione um projeto</option>
                <option value="Projeto A">Projeto A</option>
                <option value="Projeto B">Projeto B</option>
                <option value="Projeto C">Projeto C</option>
            </select>
            <br/><br/>

            <label for="titulo">Título da Atividade:</label>
            <input type="text" id="titulo" name="titulo" required>
            <br/><br/>

            <label for="descricao">Descrição da Atividade:</label><br><br>
            <textarea id="descricao" name="descricao" rows="4" cols="50" required></textarea>
            <br/><br/>

            <label for="data_inicio">Data de Início:</label>
            <input type="date" id="data_inicio" name="data_inicio" required>
            <br/><br/>

            <label for="hora_inicio">Hora de Início:</label>
            <input type="time" id="hora_inicio" name="hora_inicio" required>
            <br/><br/>
            
            <label for="data_fim">Data de Término:</label>
            <input type="date" id="data_fim" name="data_fim" required>
            <br/><br/>

            <label for="hora_fim">Hora de Término:</label>
            <input type="time" id="hora_fim" name="hora_fim" required>
            <br/><br/>

            <label for="local">Local:</label>
            <input type="text" id="local" name="local" required>
            <br/><br/>

            <label for="participantes">Participantes:</label><br><br>
            <input type="checkbox" id="participante1" name="participantes" value="Participante 1">
            <label for="participante1">Participante 1</label><br>
            <input type="checkbox" id="participante2" name="participantes" value="Participante 2">
            <label for="participante2">Participante 2</label><br>
            <input type="checkbox" id="participante3" name="participantes" value="Participante 3">
            <label for="participante3">Participante 3</label>
            <br/><br/>

            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar">
        </form>
    </body>
</html>
