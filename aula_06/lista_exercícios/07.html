<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EXERCÍCIO 7</title>
    </head>
    <body>
        <h1>Submissão de Entregas do Projeto</h1>
        
        <form method="POST" action="/entregas"> 

            <label for="projeto">Projeto:</label>
            <select id="projeto" name="projeto" required>
                <option value="">Selecione um projeto</option>
                <option value="Projeto A">Projeto A</option>
                <option value="Projeto B">Projeto B</option>
                <option value="Projeto C">Projeto C</option>
            </select>
            <br/><br/>

            <label for="responsavel">Responsável pela Submissão:</label>
            <input type="text" id="responsavel" name="responsavel" placeholder="ex: Israel" required>
            <br/><br/>

            <label for="tipo">Tipo de Entrega:</label>
            <select id="tipo" name="tipo" required>
                <option value="">Selecione o tipo de entrega</option>
                <option value="Documento">Documento</option>
                <option value="Apresentação">Apresentação</option>
                <option value="Código">Código</option>
            </select>
            <br/><br/>

            <label for="arquivo">Arquivo do Projeto:</label>
            <input type="file" id="arquivo" name="arquivo" required>
            <br/><br/>

            <label for="descricao">Descrição da Entrega:</label><br><br>
            <textarea id="descricao" name="descricao" rows="4" cols="50"></textarea>
            <br/><br/>

            <input type="submit" value="Submeter Entrega">
            <input type="reset" value="Resetar">
        </form>
    </body>
</html>
