<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EXERCÍCIO 8</title>
    </head>
    <body>
        <h1>Formulário de Feedback para o Projeto</h1>
        
        <form method="POST" action="/feedback"> 

            <label for="projeto">Projeto:</label>
            <select id="projeto" name="projeto" required>
                <option value="">Selecione um projeto</option>
                <option value="Projeto A">Projeto A</option>
                <option value="Projeto B">Projeto B</option>
                <option value="Projeto C">Projeto C</option>
            </select>
            <br/><br/>

            <label for="avaliado">Participante Avaliado:</label>
            <input type="text" id="avaliado" name="avaliado" placeholder="ex: Israel" required>
            <br/><br/>

            <label for="nota">Nota (0-10):</label>
            <input type="number" id="nota" name="nota" min="0" max="10" required>
            <br/><br/>

            <label for="comentarios">Comentários e Sugestões:</label><br><br>
            <textarea id="comentarios" name="comentarios" rows="4" cols="50"></textarea>
            <br/><br/>

            <input type="submit" value="Enviar Feedback">
            <input type="reset" value="Resetar">
        </form>
    </body>
</html>
