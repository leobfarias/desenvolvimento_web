<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EXERCÍCIO 6</title>
    </head>
    <body>
        <h1>Registro de Presença</h1>

        <form method="POST" action="/presenca">

            <label for="evento">Evento:</label>
            <select id="evento" name="evento" required>
                <option value="">Selecione um evento</option>
                <option value="Evento A">Evento A</option>
                <option value="Evento B">Evento B</option>
                <option value="Evento C">Evento C</option>
            </select>
            <br/><br/>

            <label for="participantes">Participantes:</label><br><br>
            <input type="checkbox" id="participante1" name="participantes" value="participantes1">
            <label for="participante1">Participante 1</label><br>
            <input type="checkbox" id="participante2" name="participantes" value="participantes2">
            <label for="participante2">Participante 2</label><br>
            <input type="checkbox" id="participante3" name="participantes" value="participantes3">
            <label for="participante3">Participante 3</label><br>
            <br/><br/>

            <label for="justificativa">Justificativa de Ausência:</label><br><br>
            <textarea id="justificativa" name="justificativa" rows="4" cols="50"></textarea>
            <br/><br/>

            <label for="local">Local ou Link:</label>
            <input type="text" id="local" name="local">
            <br/><br/>
            
            <input type="submit" value="Registrar Presença">
            <input type="reset" value="Resetar">
        </body>
</html>
