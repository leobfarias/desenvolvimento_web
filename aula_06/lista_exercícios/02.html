<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EXERCÍCIO 2</title>
    </head>
    <body>
        <h1>Cadastro de Projetos</h1>

        <form method="POST" action="/projetos">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome" required>
            <br/><br/>

            <label for="tema">Área Temática:</label>
            <input type="text" id="tema" name="tema" placeholder="Digite o tema" required>
            <br/><br/>

            <label for="descricao">Descrição:</label><br>
            <textarea id="descricao" name="descricao" rows="4" cols="50" placeholder="Digite a descrição" required></textarea>
            <br/><br/>

            <label for="responsavel">Responsável:</label>
            <select id="responsavel" name="responsavel" required>
                <option value="">Selecione um responsável</option>
                <option value="João">João</option>
                <option value="Maria">Maria</option>
                <option value="Carlos">Carlos</option>
                <option value="Ana">Ana</option>
            </select>
            <br/><br/>

            <label for="data_inicio" >Data de Início:</label>
            <input type="date" id="data_inicio" name="data_inicio" required>
            <br/><br/>

            <label for="data_fim">Data de Término:</label>
            <input type="date" id="data_fim" name="data_fim" required>
            <br/><br/>

            <input type="submit" value="Enviar">
            <input type="reset" value="Resetar">
        </form>
    </body>
</html>
